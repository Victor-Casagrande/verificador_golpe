<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinela</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app-container">

    <!-- ================= TELA DE LOGIN ================= -->
    <div id="login-view" class="view">
      <div class="popup-header">
        <div class="header-brand">
          <img src="logo-symbol.png" alt="Símbolo Sentinela" class="header-logo-symbol">
          <img src="logo-text.png" alt="Sentinela" class="header-logo-text">
        </div>
        <span class="header-sep"></span>
      </div>

      <div class="login-body">
        <div class="field-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="" autocomplete="email" />
        </div>

        <div class="field-group">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="" autocomplete="current-password" />
        </div>

        <div class="oauth-row">
          <button id="btn-google" class="oauth-btn">
            <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button id="btn-github" class="oauth-btn">
            <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" fill="#fff"/>
            </svg>
            Github
          </button>
        </div>

        <div class="login-footer-row">
          <button id="btn-login-local" class="btn-logar">Logar</button>
        </div>
      </div>
    </div>

    <!-- ================= TELA DE CADASTRO ================= -->
    <div id="register-view" class="view hidden">
      <div class="popup-header">
        <div class="header-brand">
          <img src="logo-symbol.png" alt="Símbolo Sentinela" class="header-logo-symbol">
          <img src="logo-text.png" alt="Sentinela" class="header-logo-text">
        </div>
      </div>
      <div class="login-body">
        <div class="field-group">
          <label for="reg-name">Nome</label>
          <input id="reg-name" type="text" placeholder="Seu nome completo" />
        </div>
        <div class="field-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="Digite seu email" />
        </div>
        <div class="field-group">
          <label for="reg-password">Senha</label>
          <input id="reg-password" type="password" placeholder="Crie sua senha" />
        </div>
        <div class="login-footer-row">
          <span class="link-alt" id="link-to-login">← Entrar</span>
          <button id="btn-register-local" class="btn-logar">Cadastrar</button>
        </div>
      </div>
    </div>

    <!-- ================= DASHBOARD (LOGADO) ================= -->
    <div id="dashboard-view" class="view hidden">
      <div class="popup-header">
        <div class="header-brand">
          <img src="logo-symbol.png" alt="Símbolo Sentinela" class="header-logo-symbol">
          <img src="logo-text.png" alt="Sentinela" class="header-logo-text">
        </div>
        <button id="btn-logout" class="btn-close" title="Sair">✕</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div id="total-checks" class="stat-number">0</div>
          <div class="stat-label">Verificações</div>
        </div>
        <div class="stat-card">
          <div id="safe-checks" class="stat-number">0</div>
          <div class="stat-label">Seguros</div>
        </div>
        <div class="stat-card">
          <div id="danger-checks" class="stat-number">0</div>
          <div class="stat-label">Suspeitos</div>
        </div>
      </div>

      <div class="url-section">
        <label class="url-label">URL</label>
        <div id="current-url-display" class="url-display">—</div>
      </div>

      <div class="dash-actions">
        <button id="btn-verify" class="btn-verificar">Verificar</button>
        <button id="btn-report" class="btn-denunciar">Denunciar</button>
      </div>

      <!-- Resultado da análise (exibido após clicar em Verificar) -->
      <div id="verify-result" class="verify-result hidden"></div>

      <!-- Resultado de acessibilidade minimalista -->
      <div id="a11y-result" class="a11y-result hidden">
        <div class="a11y-score-row">
          <span class="a11y-score-number" id="a11y-score-value">—</span>
          <span class="a11y-score-unit">/100</span>
          <span class="a11y-score-label" id="a11y-score-label">acessibilidade</span>
        </div>
        <ul id="accessibility-violations-list" class="violations-list"></ul>
      </div>
    </div>

  </div><!-- /.app-container -->

  <!-- MODAL DE DENÚNCIA -->
  <div id="report-modal" class="modal hidden">
    <div class="modal-content">
      <h3>🚨 Denunciar Página</h3>
      <p id="report-domain"></p>
      <textarea id="report-reason" rows="4" placeholder="Descreva o motivo da denúncia..."></textarea>
      <div class="modal-actions">
        <button id="btn-cancel-report" class="btn-secondary">Cancelar</button>
        <button id="btn-confirm-report" class="btn-logar">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>

  <!-- ALERTA DE SEGURANÇA (OVERLAY) -->
  <div id="danger-overlay" class="danger-overlay hidden">
    <div class="danger-content">
      <div class="danger-icon">!</div>
      <h1 class="danger-title">ALERTA DE SEGURANÇA</h1>
      <div class="danger-badge">GOLPE CONFIRMADO</div>
      <p class="danger-text">URL classificada como maliciosa pelo Google Safe Browsing.</p>
      <div class="danger-actions">
        <button id="btn-danger-leave" class="btn-danger-primary">Voltar para local seguro</button>
        <button id="btn-danger-ignore" class="btn-danger-secondary">Ignorar e ver relatório</button>
      </div>
    </div>
  </div>

</body>
</html>
