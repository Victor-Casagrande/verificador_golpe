<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinela</title>

  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="login-view" class="view">

      <div class="logo-area">
        <img src="icon.png" alt="Sentinela">
        <h1>SENTINELA</h1>
      </div>

      <div class="auth-form">

  <label>Email</label>
  <input
    id="email"
    type="email"
    placeholder="Digite seu email"
  />

  <label>Senha</label>
  <input
    id="password"
    type="password"
    placeholder="Digite sua senha"
  />

  <div class="oauth-buttons">

    <button id="btn-google" class="oauth-btn">
      Google
    </button>

    <button id="btn-github" class="oauth-btn">
      GitHub
    </button>

  </div>

  <button id="btn-login-local" class="btn primary">
    Logar
  </button>

</div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-view" class="view hidden">

      <div class="header-dashboard">
        <div>
          <h2>🛡️ Sentinela</h2>
          <span>Central de Segurança</span>
        </div>

        <button id="btn-logout" class="btn-text">
          Sair
        </button>
      </div>

      <div class="stats">

        <div class="stat-card">
          <div id="total-checks" class="stat-number">0</div>
          <div class="stat-label">Verificações</div>
        </div>

        <div class="stat-card safe">
          <div id="safe-checks" class="stat-number">0</div>
          <div class="stat-label">Seguros</div>
        </div>

        <div class="stat-card danger">
          <div id="danger-checks" class="stat-number">0</div>
          <div class="stat-label">Suspeitos</div>
        </div>

      </div>

      <button id="btn-report" class="btn warning">
        🚨 Denunciar Página Atual
      </button>

      <div class="tabs">
        <button class="tab-btn active" data-target="history-tab">
          Histórico
        </button>

        <button class="tab-btn" data-target="ranking-tab">
          Ranking
        </button>

        <button class="tab-btn" data-target="accessibility-tab" id="btn-tab-accessibility">
          Acessibilidade
        </button>
      </div>

      <div id="history-tab" class="tab-content">
        <ul id="history-list" class="list">
          <li class="loading">
            Carregando histórico...
          </li>
        </ul>
      </div>

      <div id="ranking-tab" class="tab-content hidden">
        <ul id="ranking-list" class="list">
          <li class="loading">
            Carregando ranking...
          </li>
        </ul>
      </div>

      <!-- ABA ACESSIBILIDADE -->
      <div id="accessibility-tab" class="tab-content hidden">

        <!-- Score da página atual -->
        <div class="a11y-score-card" id="a11y-score-card">
          <div class="a11y-score-wrap">
            <span id="a11y-score-value" class="a11y-score-number">—</span>
            <span class="a11y-score-unit">/100</span>
          </div>
          <div class="a11y-score-meta">
            <span id="a11y-score-label" class="a11y-score-label">Nota de acessibilidade</span>
            <span id="a11y-cache-badge" class="a11y-cache-badge hidden">cache</span>
          </div>
        </div>

        <!-- Lista de violações com Linguagem Simples -->
        <ul
          id="accessibility-violations-list"
          class="violations-list"
          role="list"
          aria-live="polite"
          aria-label="Lista de violações de acessibilidade"
        >
          <li class="violation-idle">
            Clique nesta aba para analisar a página atual.
          </li>
        </ul>

      </div>

    </div>

  </div>

  <!-- MODAL -->

  <div id="report-modal" class="modal hidden">

    <div class="modal-content">

      <h3>🚨 Denunciar Página</h3>

      <p id="report-domain"></p>

      <textarea
        id="report-reason"
        rows="4"
        placeholder="Descreva o motivo da denúncia..."
      ></textarea>

      <div class="modal-actions">

        <button
          id="btn-cancel-report"
          class="btn secondary"
        >
          Cancelar
        </button>

        <button
          id="btn-confirm-report"
          class="btn warning"
        >
          Confirmar
        </button>

      </div>

    </div>

  </div>

  <script src="popup.js"></script>

</body>
</html>
