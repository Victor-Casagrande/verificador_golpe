services:
  db:
    image: postgres:16-alpine
    container_name: sentinela-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sentinela}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sentinela}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sentinela-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    # Carrega TODAS as variáveis do .env da raiz do projeto dentro do container.
    # É o mesmo arquivo que o `docker compose` usa para interpolar ${VAR} acima —
    # declarando aqui de forma explícita garantimos que credenciais OAuth
    # (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET)
    # cheguem ao processo Node mesmo quando esquecermos de listá-las em `environment`.
    env_file:
      - ./.env
    environment:
      # Overrides específicos do container (sobrescrevem o env_file se presentes).
      # Mantemos defaults seguros para que `docker compose up` funcione mesmo sem .env.
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-sentinela}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3000/auth/oauth/github/callback}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/oauth/google/callback}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT:-http://localhost:3000/auth/success}
      AXE_ENABLED: ${AXE_ENABLED:-true}
      AXE_TIMEOUT_MS: ${AXE_TIMEOUT_MS:-45000}
      PUPPETEER_EXECUTABLE_PATH: /usr/lib/chromium/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOW_LOCALHOST: ${CORS_ALLOW_LOCALHOST:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
