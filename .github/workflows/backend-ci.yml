name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sentinela
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Node.js (versão 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        working-directory: ./api
        run: npm ci

      - name: Executar migrações do banco de dados
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d sentinela -f db/init/01-schema.sql
          psql -h localhost -U postgres -d sentinela -f db/init/02-auth-history-reports.sql
          psql -h localhost -U postgres -d sentinela -f db/init/03-oauth.sql
          psql -h localhost -U postgres -d sentinela -f db/init/04-axe-analytics.sql
          psql -h localhost -U postgres -d sentinela -f db/init/05-blacklist-cleanup-extensions.sql

      - name: Executar testes da API
        working-directory: ./api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: sentinela
          JWT_SECRET: teste_jwt_secret_ci
          GOOGLE_API_KEY: fake_google_api_key_ci
        run: npm test
